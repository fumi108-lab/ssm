name: SSM TEST
run-name: "[${{ github.workflow }} #${{ github.run_number }}][${{ github.event.inputs.recipeName }}] - ${{ github.event.inputs.targetInstanceId }}"

on:
  workflow_dispatch:
    inputs:
      recipeName:
        description: "Recipe Name"
        required: true
        default: "ssm-test"
      targetInstanceId:
        description: "Target Instance ID"
        required: true
      recipeArgs:
        description: "Recipe Arguments (comma-separated key=value pairs)"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1

jobs:
  run-ssm-recipe:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run SSM Recipe
        env:
          RECIPE_NAME: ${{ github.event.inputs.recipeName }}
          TARGET_INSTANCE_ID: ${{ github.event.inputs.targetInstanceId }}
          RECIPE_ARGS: ${{ github.event.inputs.recipeArgs }}
        run: |
          set -uo pipefail

          run_aws() {
            local output
            local exit_code

            set +e
            output="$("$@" 2>&1)"
            exit_code=$?
            set -e

            printf '%s\n' "$output"

            if [ "$exit_code" -ne 0 ]; then
              echo "AWS command failed (${exit_code}): $*" >&2
              exit "$exit_code"
            fi
          }

          parameters="{}"

          echo "AWS CLI version:"
          aws --version
          echo "Recipe name: ${RECIPE_NAME}"
          echo "Target instance: ${TARGET_INSTANCE_ID}"
          echo "Raw recipe args: ${RECIPE_ARGS:-<empty>}"

          if [ -n "${RECIPE_ARGS}" ]; then
            parameters="$(printf '%s' "${RECIPE_ARGS}" | jq -Rc '
              split(",")
              | map(select(length > 0))
              | map(
                  capture("^(?<key>[^=]+)=(?<value>.*)$")
                  | if .key != "" then
                      {key: .key, value: [.value]}
                    else
                      error("recipeArgs must be comma-separated key=value pairs")
                    end
                )
              | from_entries
            ')"
          fi

          echo "Resolved parameters: ${parameters}"
          echo "Caller identity:"
          run_aws aws sts get-caller-identity
          echo "Document check:"
          run_aws aws ssm describe-document --name "${RECIPE_NAME}" --query 'Document.{Name:Name,Status:Status,DocumentVersion:DocumentVersion}' --output json
          echo "Managed instance check:"
          run_aws aws ssm describe-instance-information --filters "Key=InstanceIds,Values=${TARGET_INSTANCE_ID}" --output json

          command_id="$(
            run_aws aws ssm send-command \
              --document-name "${RECIPE_NAME}" \
              --instance-ids "${TARGET_INSTANCE_ID}" \
              --parameters "${parameters}" \
              --comment "Triggered by GitHub Actions run ${{ github.run_id }}" \
              --query 'Command.CommandId' \
              --output text
          )"

          echo "command_id=${command_id}" >> "${GITHUB_OUTPUT}"
          echo "Sent command: ${command_id}"

          run_aws aws ssm wait command-executed \
            --command-id "${command_id}" \
            --instance-id "${TARGET_INSTANCE_ID}"

          status="$(
            run_aws aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${TARGET_INSTANCE_ID}" \
              --query 'Status' \
              --output text
          )"

          stdout="$(
            run_aws aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${TARGET_INSTANCE_ID}" \
              --query 'StandardOutputContent' \
              --output text
          )"

          stderr="$(
            run_aws aws ssm get-command-invocation \
              --command-id "${command_id}" \
              --instance-id "${TARGET_INSTANCE_ID}" \
              --query 'StandardErrorContent' \
              --output text
          )"

          {
            echo "## SSM Test Result"
            echo ""
            echo "- Document: \`${RECIPE_NAME}\`"
            echo "- Instance: \`${TARGET_INSTANCE_ID}\`"
            echo "- Command ID: \`${command_id}\`"
            echo "- Status: \`${status}\`"
            echo ""
            echo "### Standard Output"
            echo '```'
            printf '%s\n' "${stdout}"
            echo '```'
            echo ""
            echo "### Standard Error"
            echo '```'
            printf '%s\n' "${stderr}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          [ "${status}" = "Success" ]
