name: SSM TEST
run-name: "[${{ github.workflow }} #${{ github.run_number }}][${{ github.event.inputs.recipeName }}] - ${{ github.event.inputs.targetInstanceId }}"

on:
  workflow_dispatch:
    inputs:
      recipeName:
        description: "Recipe Name"
        required: true
        default: "ssm-test"
      targetInstanceId:
        description: "Target Instance ID"
        required: true
      recipeArgs:
        description: "Recipe Arguments (comma-separated key=value pairs)"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1

jobs:
  run-ssm-recipe:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run SSM Recipe
        env:
          RECIPE_NAME: ${{ github.event.inputs.recipeName }}
          TARGET_INSTANCE_ID: ${{ github.event.inputs.targetInstanceId }}
          RECIPE_ARGS: ${{ github.event.inputs.recipeArgs }}
        run: |
          set -euo pipefail

          run_aws_capture() {
            local __resultvar="$1"
            shift

            local output
            local exit_code

            set +e
            output="$("$@" 2>&1)"
            exit_code=$?
            set -e

            if [ "$exit_code" -ne 0 ]; then
              printf '%s\n' "$output" >&2
              echo "AWS command failed (${exit_code}): $*" >&2
              exit "$exit_code"
            fi

            printf -v "$__resultvar" '%s' "$output"
          }

          parameters=""

          echo "AWS CLI version:"
          aws --version
          echo "Recipe name: ${RECIPE_NAME}"
          echo "Target instance: ${TARGET_INSTANCE_ID}"
          echo "Raw recipe args: ${RECIPE_ARGS:-<empty>}"

          echo "Caller identity:"
          run_aws_capture caller_identity aws sts get-caller-identity
          printf '%s\n' "${caller_identity}"
          echo "Document check:"
          run_aws_capture document_summary aws ssm describe-document --name "${RECIPE_NAME}" --query 'Document.{Name:Name,Status:Status,DocumentVersion:DocumentVersion}' --output json
          printf '%s\n' "${document_summary}"
          run_aws_capture document_content aws ssm get-document --name "${RECIPE_NAME}" --document-version '$LATEST' --query 'Content' --output text
          echo "Managed instance check:"
          run_aws_capture instance_info aws ssm describe-instance-information --filters "Key=InstanceIds,Values=${TARGET_INSTANCE_ID}" --output json
          printf '%s\n' "${instance_info}"

          parameter_count="$(
            printf '%s' "${document_content}" | jq -r '
              (.parameters // {})
              | length
            '
          )"

          single_parameter_name="$(
            printf '%s' "${document_content}" | jq -r '
              (.parameters // {})
              | keys
              | if length == 1 then .[0] else "" end
            '
          )"

          required_parameters="$(
            printf '%s' "${document_content}" | jq -r '
              (.parameters // {})
              | to_entries
              | map(select((.value.default // .value.defaultValue // "") == ""))
              | map(.key)
              | join(",")
            '
          )"

          if [ -n "${RECIPE_ARGS}" ]; then
            if [[ "${RECIPE_ARGS}" == *"="* ]]; then
              parameters="$(printf '%s' "${RECIPE_ARGS}" | jq -Rc '
                split(",")
                | map(select(length > 0))
                | map(
                    capture("^(?<key>[^=]+)=(?<value>.*)$")
                    | if .key != "" then
                        {key: .key, value: [.value]}
                      else
                        error("recipeArgs must be comma-separated key=value pairs")
                      end
                  )
                | from_entries
              ')"
            elif [ "${parameter_count}" = "1" ] && [ -n "${single_parameter_name}" ]; then
              parameters="$(
                jq -nc \
                  --arg key "${single_parameter_name}" \
                  --arg value "${RECIPE_ARGS}" \
                  '{($key): [$value]}'
              )"
            else
              echo "recipeArgs must be key=value pairs for documents with multiple parameters" >&2
              exit 1
            fi
          fi

          echo "Resolved parameters: ${parameters:-<empty>}"

          if [ -n "${required_parameters}" ] && [ -z "${parameters}" ]; then
            echo "Missing required recipeArgs. Document \`${RECIPE_NAME}\` requires: ${required_parameters}" >&2
            exit 1
          fi

          if [ -n "${required_parameters}" ] && [ -n "${parameters}" ]; then
            missing_parameters="$(
              jq -nr \
                --argjson params "${parameters}" \
                --arg required "${required_parameters}" '
                  ($required | split(",") | map(select(length > 0))) as $required_keys
                  | $required_keys
                  | map(select($params[.] == null))
                  | join(",")
                '
            )"

            if [ -n "${missing_parameters}" ]; then
              echo "Missing required recipeArgs keys: ${missing_parameters}" >&2
              exit 1
            fi
          fi

          send_command_args=(
            aws ssm send-command
            --document-name "${RECIPE_NAME}"
            --instance-ids "${TARGET_INSTANCE_ID}"
            --comment "Triggered by GitHub Actions run ${{ github.run_id }}"
            --query Command.CommandId
            --output text
          )

          if [ -n "${parameters}" ]; then
            send_command_args+=(--parameters "${parameters}")
          fi

          run_aws_capture command_id "${send_command_args[@]}"

          echo "command_id=${command_id}" >> "${GITHUB_OUTPUT}"
          echo "Sent command: ${command_id}"

          run_aws_capture wait_output aws ssm wait command-executed \
            --command-id "${command_id}" \
            --instance-id "${TARGET_INSTANCE_ID}"

          run_aws_capture status aws ssm get-command-invocation \
            --command-id "${command_id}" \
            --instance-id "${TARGET_INSTANCE_ID}" \
            --query 'Status' \
            --output text

          run_aws_capture stdout aws ssm get-command-invocation \
            --command-id "${command_id}" \
            --instance-id "${TARGET_INSTANCE_ID}" \
            --query 'StandardOutputContent' \
            --output text

          run_aws_capture stderr aws ssm get-command-invocation \
            --command-id "${command_id}" \
            --instance-id "${TARGET_INSTANCE_ID}" \
            --query 'StandardErrorContent' \
            --output text

          {
            echo "## SSM Test Result"
            echo ""
            echo "- Document: \`${RECIPE_NAME}\`"
            echo "- Instance: \`${TARGET_INSTANCE_ID}\`"
            echo "- Command ID: \`${command_id}\`"
            echo "- Status: \`${status}\`"
            echo ""
            echo "### Standard Output"
            echo '```'
            printf '%s\n' "${stdout}"
            echo '```'
            echo ""
            echo "### Standard Error"
            echo '```'
            printf '%s\n' "${stderr}"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"

          [ "${status}" = "Success" ]
