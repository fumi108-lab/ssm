name: ssm-deploy

on:
  pull_request:
    branches: ["dev"]
    paths:
      - "command_documents/healthcheck/*.json"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  DOC_DIR: command_documents/healthcheck
  PLAN_ARTIFACT_NAME: ssm-deploy-plan

jobs:
  validate:
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'dev' }}
    runs-on: ubuntu-latest
    outputs:
      changed_count: ${{ steps.changed_files.outputs.changed_count }}
      changed_files_json: ${{ steps.changed_files.outputs.changed_files_json }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: UTF-8 check
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in "${DOC_DIR}"/*.json; do
            iconv -f UTF-8 -t UTF-8 "$f" > /dev/null
          done

      - name: JSON parse check
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in "${DOC_DIR}"/*.json; do
            jq -e . "$f" > /dev/null
          done

      - name: Collect changed documents
        id: changed_files
        run: |
          set -euo pipefail

          base_sha="${{ github.event.pull_request.base.sha }}"
          head_sha="${{ github.event.pull_request.head.sha }}"

          mapfile -t changed_files < <(
            git diff --name-only "$base_sha" "$head_sha" -- "${DOC_DIR}/*.json"
          )

          {
            echo "## Validate Summary"
            echo ""
            echo "- Base SHA: \`$base_sha\`"
            echo "- Head SHA: \`$head_sha\`"
            echo "- Changed document count: \`${#changed_files[@]}\`"
            echo ""
            echo "### Changed Documents"
            if [ "${#changed_files[@]}" -eq 0 ]; then
              echo "- None"
            else
              for f in "${changed_files[@]}"; do
                echo "- \`$f\`"
              done
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          changed_json="$(printf '%s\n' "${changed_files[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))')"

          echo "changed_count=${#changed_files[@]}" >> "$GITHUB_OUTPUT"
          echo "changed_files_json=$changed_json" >> "$GITHUB_OUTPUT"

  plan:
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'dev' }}
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      actionable_count: ${{ steps.build_plan.outputs.actionable_count }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Configure AWS (dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build deployment plan
        id: build_plan
        env:
          CHANGED_FILES_JSON: ${{ needs.validate.outputs.changed_files_json }}
        run: |
          set -euo pipefail

          mkdir -p plan
          : > plan/plan.tsv

          actionable_count=0
          create_count=0
          update_count=0
          skip_count=0
          missing_count=0

          : > plan/create_list.md
          : > plan/update_list.md
          : > plan/skip_list.md
          : > plan/missing_list.md

          while IFS= read -r f; do
            [ -n "$f" ] || continue

            if [ ! -f "$f" ]; then
              missing_count=$((missing_count + 1))
              echo "- \`$f\`" >> plan/missing_list.md
              continue
            fi

            base="$(basename "$f")"
            name="${base%.*}"
            action="skip"

            local_norm="$(jq -S -c . "$f")"

            if aws ssm describe-document --name "$name" >/dev/null 2>&1; then
              aws_raw="$(aws ssm get-document --name "$name" --document-version '$LATEST' --query 'Content' --output text)"
              aws_norm="$(printf '%s' "$aws_raw" | jq -S -c .)"

              if [ "$local_norm" != "$aws_norm" ]; then
                action="update"
              fi
            else
              action="create"
            fi

            printf '%s\t%s\t%s\n' "$action" "$name" "$f" >> plan/plan.tsv

            case "$action" in
              create)
                actionable_count=$((actionable_count + 1))
                create_count=$((create_count + 1))
                echo "- \`$name\` : \`$f\`" >> plan/create_list.md
                ;;
              update)
                actionable_count=$((actionable_count + 1))
                update_count=$((update_count + 1))
                echo "- \`$name\` : \`$f\`" >> plan/update_list.md
                ;;
              skip)
                skip_count=$((skip_count + 1))
                echo "- \`$name\` : \`$f\`" >> plan/skip_list.md
                ;;
            esac
          done < <(printf '%s' "$CHANGED_FILES_JSON" | jq -r '.[]')

          {
            echo "# SSM Deploy Plan"
            echo ""
            echo "## Review Result"
            echo ""
            echo "- Actionable documents: \`$actionable_count\`"
            echo "- Create: \`$create_count\`"
            echo "- Update: \`$update_count\`"
            echo "- Skip: \`$skip_count\`"
            echo "- Missing in workspace: \`$missing_count\`"
            echo ""
            if [ "$actionable_count" -eq 0 ]; then
              echo "No deployment is required."
            else
              echo "Approve the \`dev-ssm-review\` environment after reviewing the actionable documents below."
            fi
            echo ""
            echo "## Create"
            echo ""
            if [ -s plan/create_list.md ]; then
              cat plan/create_list.md
            else
              echo "- None"
            fi
            echo ""
            echo "## Update"
            echo ""
            if [ -s plan/update_list.md ]; then
              cat plan/update_list.md
            else
              echo "- None"
            fi
            echo ""
            echo "## Skip"
            echo ""
            if [ -s plan/skip_list.md ]; then
              cat plan/skip_list.md
            else
              echo "- None"
            fi
            echo ""
            echo "## Missing"
            echo ""
            if [ -s plan/missing_list.md ]; then
              cat plan/missing_list.md
            else
              echo "- None"
            fi
            echo ""
            echo "## Full Plan"
            echo ""
            echo "| Action | Document | File |"
            echo "| --- | --- | --- |"
            awk -F '\t' '{printf("| %s | `%s` | `%s` |\n", $1, $2, $3)}' plan/plan.tsv
          } >> plan/summary.md

          cat plan/summary.md >> "$GITHUB_STEP_SUMMARY"
          echo "actionable_count=$actionable_count" >> "$GITHUB_OUTPUT"

      - name: Upload deployment plan
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLAN_ARTIFACT_NAME }}
          path: plan
          if-no-files-found: error

  deploy:
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'dev' && needs.plan.outputs.actionable_count != '0' }}
    needs: plan
    runs-on: ubuntu-latest
    environment:
      name: dev-ssm-review
    steps:
      - uses: actions/checkout@v4

      - name: Download deployment plan
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PLAN_ARTIFACT_NAME }}
          path: plan

      - name: Show approved plan
        run: |
          set -euo pipefail
          cat plan/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Configure AWS (dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy approved documents to dev
        run: |
          set -euo pipefail

          while IFS=$'\t' read -r action name file_path; do
            [ -n "$action" ] || continue

            case "$action" in
              create)
                echo "Creating document: $name from $file_path"
                aws ssm create-document \
                  --name "$name" \
                  --content "file://$file_path" \
                  --document-type "Command" \
                  --document-format JSON
                ;;
              update)
                echo "Updating document: $name from $file_path"
                aws ssm update-document \
                  --name "$name" \
                  --content "file://$file_path" \
                  --document-format JSON \
                  --document-version '$LATEST'

                latest_ver="$(aws ssm describe-document \
                  --name "$name" \
                  --query 'Document.LatestVersion' \
                  --output text)"

                aws ssm update-document-default-version \
                  --name "$name" \
                  --document-version "$latest_ver"
                ;;
              skip)
                echo "Skipping unchanged document: $name"
                ;;
              *)
                echo "Unknown action '$action' for $name" >&2
                exit 1
                ;;
            esac
          done < plan/plan.tsv
