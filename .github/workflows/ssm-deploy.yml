name: ssm-deploy

on:
  # PR1: feature/* -> dev
  pull_request:
    branches: ["dev"]
    paths:
      - "command_documents/healthcheck/*.json"

  # PR2がマージされて main に反映されたら prd 実行
  # push:
  #     branches: ["main"]
  #     paths:
  #         - "command_documents/healthcheck/*.json"
  #         - ".github/workflows/**"
  # workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  DOC_DIR: command_documents/healthcheck

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # 2-1 UTF-8 チェック
      - name: UTF-8 check (json only)
        run: |
          set -euo pipefail
          shopt -s globstar
          for f in ${DOC_DIR}/**/*.json; do
            [ -f "$f" ] || continue
            iconv -f UTF-8 -t UTF-8 "$f" > /dev/null
          done

      # 2-2 JSON 構文チェック
      - name: JSON parse check
        run: |
          set -euo pipefail
          shopt -s globstar
          for f in ${DOC_DIR}/*.json; do
            [ -f "$f" ] || continue
            jq . "$f" > /dev/null
          done

      # 2-3 SSM Command ドキュメントとしての必須構造チェック（jq）
      # - name: SSM Command document structure check
      #   run: |
      #       set -euo pipefail
      #       shopt -s globstar
      #       for f in ${DOC_DIR}/*.json; do
      #         [ -f "$f" ] || continue
      #         echo "Checking: $f"

      #         # 必須トップレベル: schemaVersion/mainSteps
      #         jq -e '
      #           (.schemaVersion | type=="string" and length>0)
      #           and
      #           (.mainSteps | type=="array" and length>0)
      #         ' "$f" > /dev/null

      #         # mainSteps 必須: name/action/inputs
      #         jq -e '
      #           .mainSteps
      #           | all(
      #               (.name | type=="string" and length>0)
      #               and
      #               (.action | type=="string" and (
      #                     .=="aws:runShellScript"
      #                  or .=="aws:runPowerShellScript"
      #                  or .=="aws:runDocument"
      #                  or .=="aws:runAnsiblePlaybook"
      #               ))
      #               and
      #               (.inputs | type=="object")
      #           )
      #         ' "$f" > /dev/null

      #         # aws:runShellScript の commands は配列＋要素あり（該当stepがある場合）
      #         jq -e '
      #           .mainSteps
      #           | map(select(.action=="aws:runShellScript"))
      #           | all(.inputs.commands | type=="array" and length>0)
      #         ' "$f" > /dev/null

      #         # aws:runPowerShellScript の commands は配列＋要素あり（該当stepがある場合）
      #         jq -e '
      #           .mainSteps
      #           | map(select(.action=="aws:runPowerShellScript"))
      #           | all(.inputs.commands | type=="array" and length>0)
      #         ' "$f" > /dev/null
      #       done

  deploy_and_run_dev:
    # PR1のときだけ実行
    if: ${{ github.event_name == 'pull_request' && github.base_ref == 'dev' }}
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # dev AWSへ（OIDC）
      - name: Configure AWS (dev)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_DEV }}
          aws-region: ${{ env.AWS_REGION }}

      # 3 devへSSMドキュメントアップロード（JSON固定）
      # すでに存在する場合はUpdate, デフォルトバージョンの変更 / 存在しない場合は新規
      - name: Deploy SSM Command Documents to dev
        run: |
          set -euo pipefail
          shopt -s globstar
          for f in ${DOC_DIR}/*.json; do
            [ -f "$f" ] || continue
            base="$(basename "$f")"
            name="${base%.*}"
            echo "Deploying document: $name from $f"

            if aws ssm describe-document --name "$name" >/dev/null 2>&1; then
              aws ssm update-document \
                --name "$name" \
                --content "file://$f" \
                --document-format JSON \
                --document-version '$LATEST'

              LATEST_VER=$(aws ssm describe-document \
                --name "$name" \
                --query 'Document.LatestVersion' \
                --output text)

              aws ssm update-document-default-version \
                --name "$name" \
                --document-version "$LATEST_VER"
            else  
              aws ssm create-document \
                --name "$name" \
                --content "file://$f" \
                --document-type "Command" \
                --document-format JSON
            fi
          done

  deploy_and_run_prd:
    # mainにpush（= PR2マージ後）で実行
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # prd AWSへ（OIDC）
      - name: Configure AWS (prd)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_PRD }}
          aws-region: ${{ env.AWS_REGION }}

      # 7 prdへSSMドキュメントアップロード
      - name: Deploy SSM Command Documents to prd
        run: |
          set -euo pipefail
          shopt -s globstar
          for f in ${DOC_DIR}/*.json; do
            [ -f "$f" ] || continue
            base="$(basename "$f")"
            name="${base%.*}"
            echo "Deploying document: $name from $f"

            if aws ssm describe-document --name "$name" >/dev/null 2>&1; then
              aws ssm update-document \
                --name "$name" \
                --content "file://$f" \
                --document-format JSON \
                --document-version '$LATEST'

              LATEST_VER=$(aws ssm describe-document \
                --name "$name" \
                --query 'Document.LatestVersion' \
                --output text)

              aws ssm update-document-default-version \
                --name "$name" \
                --document-version "$LATEST_VER"
            else  
              aws ssm create-document \
                --name "$name" \
                --content "file://$f" \
                --document-type "Command" \
                --document-format JSON
            fi
          done

      # 9 Teams通知（Incoming Webhook）
      - name: Notify Teams
        if: always()
        run: |
          set -euo pipefail
          STATUS="${{ job.status }}"
          CMD_ID="${{ steps.run_prd.outputs.command_id }}"
          TEXT="SSM prd run finished: ${STATUS} (CommandId: ${CMD_ID})"
          curl -H "Content-Type: application/json" \
            -d "{\"text\":\"${TEXT}\"}" \
            "${{ secrets.TEAMS_WEBHOOK_URL }}"
